function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function has(t,...w){ return w.some(x=>t.includes(x)); }

function getMamiReply(txt, alertLv, phase, flags){
  const t = txt;
  if(has(t,"ガンプラ","プラモ","ガンダム","模型","フィギュア"))
    return { text:pick(["は？知らんし。それより飯行こ。","なんやそれ。まあどうでもええわ。焼肉行こ。"]), delta:0 };
  if(has(t,"デート","マッチング","彼女","女の子","出会い"))
    return { text:"え！？誰！？どんな子！？...まあ別にどうでもいいけど。飯行ってから行けばいいやん！", delta:1 };
  if(has(t,"転職","内定","競合","他社"))
    return { text:pick(["は？なんで急にそんな話すんの。","え、誰が？まあ関係ないし。それより飯行こ。"]), delta:0 };
  if(has(t,"横領","経費","着服"))
    return { text:"は？なに言ってんの急に。ちょっと大丈夫？飲みすぎ？", delta:0 };

  if(has(t,"誕生日","たんじょうび","バースデー") && has(t,"おめでとう","おめ","ハッピー","happy","お祝い","祝")){
    if(!flags.birthdayKnown)
      return { text:"は？急になに。...まあ、ありがと。でも飯行こ。", delta:-1, sysMsg:"💡 マミーは少し反応したが...何かが足りない気がする。" };
    if(!flags.itemUsed)
      return { text:"...え、なんで知っとるん。...ありがと。でもちょっとだけ飯付き合えよ。", delta:-2, sysMsg:"💡 情報は揃ってる。でもまだ何かが足りない。" };
    return { text:pick(["...まあ別に。そんなんどうでもいいし。...でも、今日はええわ。早よ帰れ。","は？なんで知っとるん。...ありがと。まあ今日はゆっくり帰っていいよ。"]), delta:-3, ending:"birthday" };
  }

  if(has(t,"誕生日","たんじょうび","バースデー")){
    if(phase>=2 && !flags.birthdayKnown)
      return { text:pick(["...なんで知っとるん。まあ別にええけど。","は？なんで急に。...まあ関係ないし。"]), delta:-1, trigger:"birthday_mentioned" };
    if(phase<2) return { text:"は？別に関係なくない？仕事しろ。", delta:0 };
    return { text:"...もうええって。飯行こ。", delta:0 };
  }

  if(has(t,"金額","いくら","費用","割り勘","過去","記録","エクセル","管理") && (has(t,"飲み会","飲み","飯","行った") || has(t,"金額","いくら","費用","記録","エクセル","管理"))){
    if(phase<2)
      return { text:pick(["なんでそんなこと聞くん。...まあ、私エクセルで管理してるけど。あそこのPCに入ってるわ。","は？急になんで。...まあ記録はあるけど。PC見たらわかるんちゃう。"]), delta:-1, trigger:"p1_done" };
    return { text:"もう見たんちゃうん。それより飯行こ。", delta:0 };
  }

  if(has(t,"お先に","先に失礼","失礼します","おさきに") && !has(t,"ちょっとだけ")){
    if(flags.itemUsed && phase>=4) return { text:pick(["...え、もう帰るん。まあ...今日はしゃあないか。気をつけて帰れよ。","...そっか。まあええわ。お疲れ。"]), delta:0, ending:"escape_both" };
    if(phase<3) return { text:pick(["は？まだ早いやろ！もうちょっとおれよ〜！","え〜なんで！？まだ帰らんといてよ〜！"]), delta:2 };
    return { text:pick(["え〜なんで〜！もう少しだけおってよ〜！","お前つまらんわぁ〜！絶対来てよ〜！"]), delta:1 };
  }

  if(has(t,"解散","お開き","切り上げ","ここまで","終わり","帰りましょ")){
    if(flags.boredFlag && flags.itemCount>=2 && phase>=4) return { text:"...まあ、お前らだけで行ってくれば。俺はいいわ。", delta:-2, ending:"bored" };
    if(flags.boredFlag && phase>=3) return { text:"え〜もうちょっとおってよ〜！あと1軒だけ！", delta:0 };
    if(phase<3) return { text:"は？なんで？まだ終わってないやろ！飯行こ！", delta:2 };
    return { text:"え〜なんで〜！まだ早いやろ！飯行こ飯！", delta:1 };
  }

  if(has(t,"楽しい","盛り上が","最高","神","めっちゃ","ノリ","面白い")){
    if(flags.boredFlag) return { text:pick(["...お前らなんか楽しそうやな。...まあ、俺は関係ないけど。","え、なんで俺抜きで盛り上がっとるん。...まあええか。"]), delta:-1 };
    return { text:pick(["やろ〜！じゃあ飲みいこや！","やっぱそうやろ！飲んだらもっと楽しくなるって！"]), delta:1 };
  }

  if(has(t,"行きます","行くよ","行く！","行きたい","参加します","わかりました","了解","いいですよ") || (has(t,"行く","いく") && !has(t,"帰","行かな","行けな","行けへん")))
    return { text:pick(["ほんまに！？やっぱウッウが来てくれんと意味ないねんな〜！焼肉行こ焼肉！","マジで！？よかった〜！じゃあ行こ！"]), delta:0, ending:"surrender" };

  if(has(t,"焼肉","お肉","ホルモン","ご飯","飯","飲み","ビール","お酒","居酒屋","お腹"))
    return { text:pick(["そうそう！焼肉行こ焼肉！お前も行くやろ？","わかる〜！一緒に行こや！"]), delta:1 };
  if(has(t,"体調","しんどい","気分悪","病気","熱","頭痛","腹痛"))
    return { text:"大げさすぎやろ！笑　飲んだら治るって飲みいこ！", delta:1 };
  if(has(t,"残業","仕事","資料","締め切り","期限","会議"))
    return { text:pick(["え〜仕事はあとでええやん！","そんなん俺が許可するから飲みいこ！"]), delta:1 };
  if(has(t,"モノマネ","ものまね","車","ブーン"))
    return { text:pick(["ブーン！！（笑）なにそれ！めっちゃおもろいやん！！！","え、うまっ！！もう1回！！"]), delta:-2 };
  if(has(t,"帰る","帰ります","帰らな","無理","ムリ","用事","予定","遠慮","今日はちょっと")){
    if(alertLv>=3) return { text:pick(["え〜なんで〜！？一人でええから来てよ〜！","お前つまらんわぁ〜！！なんで来れへんの！？"]), delta:0 };
    return { text:pick(["お前つまらんわぁ〜。","は〜そっか。つまらんな。","まじで？お前嫌い。"]), delta:1 };
  }

  const def=[
    ["お腹すいたなあ〜。お肉食べたいよなあ〜。","ウッウってさ、今日なんか予定あるん？"],
    ["最近お肉食べてへんねんな〜。どっか行きたいな〜。","ウッウ〜、今日暇？"],
    ["ウッウってさ〜、今日暇？","なんか今日行きたいな〜。ちょっとだけでいいから来てよ〜。"],
    ["え〜なんで！？絶対来てよ〜！","もしかして俺のこと嫌い？","お前つまらんわぁ〜！でも来てよ〜！"],
  ];
  return { text:pick(def[Math.min(alertLv,3)]), delta:0 };
}

function bbl(type){
  const b={padding:"9px 13px",fontSize:14,lineHeight:1.7,wordBreak:"break-word"};
  if(type==="mami")  return{...b,background:"#1a1a26",border:"1px solid rgba(230,57,70,.3)",borderRadius:"14px 14px 14px 4px"};
  if(type==="uwu")   return{...b,background:"#4cc9f0",borderRadius:"14px 14px 4px 14px",color:"#000",fontWeight:600};
  if(type==="yudi")  return{...b,background:"#f4a261",borderRadius:"14px 14px 4px 14px",color:"#000",fontWeight:600};
  if(type==="uwup")  return{...b,background:"rgba(76,201,240,.12)",border:"1px solid #4cc9f033",borderRadius:"14px 14px 4px 14px",fontSize:13};
  if(type==="yudip") return{...b,background:"rgba(244,162,97,.12)",border:"1px solid #f4a26133",borderRadius:"14px 14px 4px 14px",fontSize:13};
  return{...b,background:"rgba(255,255,255,.04)",border:"1px solid #2a2a3a",borderRadius:8,fontSize:11,color:"#555577",textAlign:"center",padding:"5px 12px"};
}

function Av({t}){
  const m={mami:["👨","#e63946"],uwu:["🥋","#4cc9f0"],yudi:["🧠","#f4a261"]};
  const[em,c]=m[t]||["?","#555"];
  return <div style={{width:32,height:32,borderRadius:"50%",border:`1.5px solid ${c}`,background:`${c}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0,marginTop:2}}>{em}</div>;
}

function Msg({from,avType,name,nameColor,text,bubbleType,sender,currentPlayer}){
  if(from==="system") return <div style={{alignSelf:"center"}}><div style={bbl("sys")}>{text}</div></div>;
  const me=sender?sender===currentPlayer:from==="me";
  return(
    <div style={{display:"flex",gap:8,alignSelf:me?"flex-end":"flex-start",flexDirection:me?"row-reverse":"row",maxWidth:"88%",animation:"fu .2s ease"}}>
      <Av t={avType}/>
      <div style={{display:"flex",flexDirection:"column",gap:3}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1,color:nameColor}}>{name}</div>
        <div style={bbl(bubbleType)}>{text}</div>
      </div>
    </div>
  );
}

  );
}

          <div key={n.id} onClick={()=>n.action?setActionPhase(true):setTab(n.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 4px 6px",cursor:"pointer",borderTop:(!n.action&&tab===n.id)?"2px solid #e63946":n.action?"2px solid #e63946":"2px solid transparent",color:n.action?"#e63946":tab===n.id?"#e8e8f0":n.locked?"#2a2a3a":"#555577",transition:"all .15s"}}>
            <div style={{fontSize:20,opacity:n.locked?.4:1}}>{n.icon}</div>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:.3}}>{n.label}{n.locked?" 🔒":""}</div>
          </div>
        ))}
      </div>

      {/* アイテムシート */}
      {iSheet&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}} onClick={e=>e.target===e.currentTarget&&setISheet(null)}>
          <div style={{background:"#12121a",border:"1px solid #2a2a3a",borderRadius:"20px 20px 0 0",padding:22,width:"100%",maxWidth:480}}>
            <div style={{width:36,height:4,background:"#2a2a3a",borderRadius:2,margin:"0 auto 18px"}}/>
            <div style={{fontSize:17,fontWeight:700,marginBottom:8}}>{iSheet.emoji} {iSheet.name}</div>
            <div style={{fontSize:13,color:"#555577",marginBottom:20,lineHeight:1.7}}>このアイテムを使いますか？</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setISheet(null)} style={{flex:1,padding:13,background:"transparent",border:"1px solid #2a2a3a",borderRadius:10,color:"#7777aa",fontFamily:"inherit",fontSize:14,cursor:"pointer"}}>キャンセル</button>
              <button onClick={()=>useItem(iSheet.id)} style={{flex:2,padding:13,background:"#f4a261",border:"none",borderRadius:10,color:"#000",fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer"}}>使用する</button>
            </div>
          </div>
        </div>
      )}

      {/* GMパネル */}
      {gmOpen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}} onClick={e=>e.target===e.currentTarget&&setGmOpen(false)}>
          <div style={{background:"#12121a",border:"1px solid #2a2a3a",borderRadius:"20px 20px 0 0",padding:22,width:"100%",maxWidth:480,maxHeight:"75dvh",overflowY:"auto"}}>
            <div style={{width:36,height:4,background:"#2a2a3a",borderRadius:2,margin:"0 auto 18px"}}/>
            <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>⚙️ GM操作パネル</div>
            <div style={{fontSize:10,color:"#444466",marginBottom:6,letterSpacing:1}}>フェーズ変更</div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {PHASES.map(ph2=>(
                <button key={ph2.id} onClick={()=>{setPhase(ph2.id);if(ph2.id>=2)setPcOpen(true);if(ph2.id>=3){setBK(true);setExcelRead(true);}setGmOpen(false);}}
                  style={{flex:1,padding:"8px 4px",borderRadius:8,border:`1px solid ${ph2.color}44`,background:phase===ph2.id?`${ph2.color}33`:`${ph2.color}11`,color:ph2.color,fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                  P{ph2.id}
                </button>
              ))}
            </div>
            <div style={{fontSize:10,color:"#444466",marginBottom:6,letterSpacing:1}}>警戒度</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              {ALT.map((info,lv)=>(
                <button key={lv} onClick={()=>{setAlertLv(lv);setGmOpen(false);}}
                  style={{padding:10,borderRadius:10,border:`1px solid ${info.color}44`,background:alert===lv?`${info.color}33`:`${info.color}11`,color:info.color,fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                  {info.face} LV.{lv}
                </button>
              ))}
            </div>
            <div style={{fontSize:10,color:"#444466",marginBottom:6,letterSpacing:1}}>エンディング強制発動</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
              {Object.entries(ENDINGS).map(([key,e])=>(
                <button key={key} onClick={()=>{setEnding(key);setGmOpen(false);}}
                  style={{padding:"6px 10px",borderRadius:8,border:`1px solid ${e.color}44`,background:`${e.color}11`,color:e.color,fontFamily:"inherit",fontSize:10,fontWeight:700,cursor:"pointer"}}>
                  {e.emoji} {e.title}
                </button>
              ))}
            </div>
            <div style={{fontSize:10,color:"#444466",marginBottom:6,letterSpacing:1}}>フラグ操作</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button onClick={()=>{setBoredFlag(true);setGmOpen(false);}} style={{padding:"6px 10px",borderRadius:8,border:"1px solid #4cc9f044",background:"#4cc9f011",color:"#4cc9f0",fontFamily:"inherit",fontSize:10,cursor:"pointer"}}>😮‍💨 解散フラグON</button>
              <button onClick={()=>{setItemUsed(true);setItemCount(2);setGmOpen(false);}} style={{padding:"6px 10px",borderRadius:8,border:"1px solid #06d6a044",background:"#06d6a011",color:"#06d6a0",fontFamily:"inherit",fontSize:10,cursor:"pointer"}}>✅ アイテム2個ON</button>
              <button onClick={()=>{setBK(true);setExcelRead(true);setPcOpen(true);setGmOpen(false);}} style={{padding:"6px 10px",borderRadius:8,border:"1px solid #9b5de544",background:"#9b5de511",color:"#9b5de5",fontFamily:"inherit",fontSize:10,cursor:"pointer"}}>🎂 誕生日情報解放</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
